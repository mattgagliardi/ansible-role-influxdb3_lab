---
# tasks/service.yml — start/enable the systemd user service and verify health

- name: Flush handlers before starting service (ensures daemon-reload ran first)
  ansible.builtin.meta: flush_handlers

- name: "Start and enable user scope service: influxdb3-{{ influxdb3_instance_name }}"
  ansible.builtin.systemd:
    name: "influxdb3-{{ influxdb3_instance_name }}.service"
    state: started
    enabled: true
    scope: user
  become: true
  become_user: "{{ influxdb3_service_user }}"

- name: Restart service when environment file changed
  ansible.builtin.systemd:
    name: "influxdb3-{{ influxdb3_instance_name }}.service"
    state: restarted
    scope: user
  become: true
  become_user: "{{ influxdb3_service_user }}"
  when: env_file_result is defined and env_file_result.changed

- name: Poll /ping endpoint until InfluxDB 3 is ready
  ansible.builtin.uri:
    url: "http://localhost:{{ influxdb3_port }}/ping"
    method: GET
    status_code: [200, 204]
  register: _health_check
  retries: "{{ (influxdb3_startup_timeout_seconds | int / 5) | int }}"
  delay: 5
  until: _health_check.status in [200, 204]
  changed_when: false
