---
# tasks/volume.yml — provision the named Podman volume Quadlet unit.
# The volume unit file name MUST be influxdb3-{{ influxdb3_instance_name }}.volume —
# Quadlet derives the Podman volume name from this filename.

- name: Render volume Quadlet unit for instance {{ influxdb3_instance_name }}
  ansible.builtin.template:
    src: influxdb3.volume.j2
    dest: "{{ influxdb3_quadlet_dir }}/influxdb3-{{ influxdb3_instance_name }}.volume"
    mode: "0640"
  notify: "influxdb3 daemon-reload"
