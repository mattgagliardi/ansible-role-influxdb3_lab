---
# tasks/user.yml — configure user linger and config directory
# Runs as ansible_user_id — no dedicated service account required.

- name: Check if linger is already enabled for {{ ansible_user_id }}
  ansible.builtin.stat:
    path: "/var/lib/systemd/linger/{{ ansible_user_id }}"
  register: _linger_stat

- name: Enable linger for {{ ansible_user_id }}
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ ansible_user_id }}"
  changed_when: not _linger_stat.stat.exists
  when: not _linger_stat.stat.exists

- name: Ensure influxdb3 config directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/influxdb3"
    state: directory
    mode: "0700"

- name: Initialise Podman user storage (prevents first-run race on network/volume unit creation)
  ansible.builtin.command:
    cmd: podman info
  register: _podman_info_result
  changed_when: false
  failed_when: _podman_info_result.rc != 0
