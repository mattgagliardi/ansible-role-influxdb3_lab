---
# defaults/main.yml — metrics-aggregation role variable defaults
# All variables use the influxdb3_ prefix.
# Variables marked "REQUIRED — no default" cause a preflight failure if not supplied.

# -----------------------------------------------------------------------------
# Required variables (no defaults)
# -----------------------------------------------------------------------------

# influxdb3_instance_name:  # REQUIRED — no default
#   Unique identifier for this instance on the target host.
#   Used in container name, volume name, unit file names, and Traefik router.
#   Pattern: ^[a-z0-9][a-z0-9-]{1,28}[a-z0-9]$  (e.g. "lab1")

# influxdb3_hostname:  # REQUIRED — no default
#   FQDN used in the Traefik Host() routing rule.
#   Must match the TLS certificate configured in Traefik.

# -----------------------------------------------------------------------------
# Optional reference variable
# -----------------------------------------------------------------------------

# influxdb3_admin_token:  # OPTIONAL — no default, not used by the role at deploy time
#   InfluxDB 3 Core does not accept a pre-set admin token via environment variable;
#   the token is created post-deploy with:
#     podman exec influxdb3-<instance> influxdb3 create token --admin
#   Supply this variable (Vault-encrypted) as a reference for downstream consumers
#   (e.g. a Grafana datasource role or the export procedure in README.md).
#   The role does not validate or render this variable.

# -----------------------------------------------------------------------------
# Container image
# -----------------------------------------------------------------------------

# Official InfluxDB 3 Core image from Docker Hub (Apache-2.0).
# Use a digest-pinned reference in production.
influxdb3_image: "docker.io/influxdb:3-core"

# -----------------------------------------------------------------------------
# Networking
# -----------------------------------------------------------------------------

# HTTP API port InfluxDB 3 listens on inside the container.
# InfluxDB 3 changed the default from 8086 (v2) to 8181 (v3).
influxdb3_port: 8181

# Name of the Podman network all instances on this host attach to.
# Set this to the name of a pre-existing network if one already exists on the target host;
# the role will create the network if it does not already exist.
# All instances on the same host must use the same value.
influxdb3_shared_network_name: "influxdb3-net"

# Traefik entrypoint name.  Must match the TLS entrypoint in your Traefik config.
influxdb3_traefik_entrypoint: "websecure"

# -----------------------------------------------------------------------------
# Data and retention
# -----------------------------------------------------------------------------

# Default database retention period in days.
# InfluxDB 3 Core enforces retention per-database, not server-wide.
# This value is used when creating databases post-deployment via the CLI or API.
# There is no server-level retention env var; see the quickstart guide.
influxdb3_retention_days: 90

# -----------------------------------------------------------------------------
# Storage volume
# -----------------------------------------------------------------------------

# Podman volume driver.  "local" works for plain local storage;
# S3-backed storage is enabled via influxdb3_volume_options below.
influxdb3_volume_driver: "local"

# Comma-separated volume --opt string for the Quadlet .volume Options= directive.
# Empty string = plain local volume with no special options.
# S3 example: "type=fuse.s3fs,device=mybucket:/myprefix,o=use_xattr,endpoint=us-east-1"
influxdb3_volume_options: ""

# -----------------------------------------------------------------------------
# Service user
# -----------------------------------------------------------------------------

# Local non-privileged user that owns rootless containers and systemd user units.
# The account MUST pre-exist on the target host — this role never creates users.
influxdb3_service_user: "influxdb3"

# Set to true only in CI/testing to bypass service user preflight assertions.
# Never set true in production.
influxdb3_allow_root_for_testing: false

# -----------------------------------------------------------------------------
# Derived path variables
# -----------------------------------------------------------------------------

# Directory where Quadlet unit files (.container, .volume, .network) are placed.
influxdb3_quadlet_dir: "~{{ influxdb3_service_user }}/.config/containers/systemd"

# Path to the environment file that holds INFLUXDB3_ server config vars.
# Created mode 0600, owned by influxdb3_service_user.
influxdb3_env_file_path: "~{{ influxdb3_service_user }}/.config/influxdb3/{{ influxdb3_instance_name }}.env"

# -----------------------------------------------------------------------------
# Lifecycle
# -----------------------------------------------------------------------------

# Set to true to remove the instance (stops service, removes unit files and env file).
# Named volumes are NEVER deleted by this role regardless of this flag.
influxdb3_teardown: false

# systemd TimeoutStartSec and Ansible readiness probe timeout (seconds).
# Increase for slow cold-start environments.
influxdb3_startup_timeout_seconds: 120
