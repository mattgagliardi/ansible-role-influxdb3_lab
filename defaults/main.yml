---
# defaults/main.yml — metrics-aggregation role variable defaults
# All variables use the influxdb3_ prefix.
# Variables with an empty-string default cause a preflight failure if not supplied
# (the preflight asserts length > 0). Supply the value directly or via the shared
# lab_* playbook variables where noted.

# -----------------------------------------------------------------------------
# Instance name
# -----------------------------------------------------------------------------

# Unique identifier for this instance on the target host.
# Used in container name, volume name, unit file names, and Traefik router.
# Pattern: ^[a-z0-9][a-z0-9-]{1,28}[a-z0-9]$  (e.g. "lab1")
# Falls back to lab_instance_name if set at the playbook level.
influxdb3_instance_name: "{{ lab_instance_name | default('') }}"

# -----------------------------------------------------------------------------
# Container image
# -----------------------------------------------------------------------------

# Official InfluxDB 3 Core image from Docker Hub (Apache-2.0).
# Use a digest-pinned reference in production.
influxdb3_image: "docker.io/influxdb:3-core"

# -----------------------------------------------------------------------------
# Networking
# -----------------------------------------------------------------------------

# HTTP API port InfluxDB 3 listens on inside the container.
# InfluxDB 3 changed the default from 8086 (v2) to 8181 (v3).
influxdb3_http_port: 8181

# Name of a pre-existing Podman network the container should attach to.
# Defaults to "podman" (the built-in bridge network). Set this to the name of a
# shared network (e.g. one managed by Traefik) when reverse-proxy discovery is needed.
influxdb3_podman_network: "podman"

# -----------------------------------------------------------------------------
# Traefik integration
# -----------------------------------------------------------------------------

# Domain used to build the per-instance subdomain routing rule:
#   Host(`<instance>.influxdb3.<domain>`)
# Falls back to lab_traefik_domain if set at the playbook level.
influxdb3_traefik_domain: "{{ lab_traefik_domain | default('') }}"

# Traefik entrypoint name. Must match the TLS entrypoint in your Traefik config.
# Falls back to lab_traefik_entrypoint if set at the playbook level.
influxdb3_traefik_entrypoint: "{{ lab_traefik_entrypoint | default('websecure') }}"

# -----------------------------------------------------------------------------
# Data and retention
# -----------------------------------------------------------------------------

# Default database retention period in days.
# InfluxDB 3 Core enforces retention per-database, not server-wide.
influxdb3_retention_days: 90

# -----------------------------------------------------------------------------
# Storage
# -----------------------------------------------------------------------------

# Storage backend: "local" (standard Podman-managed volume) or
# "s3" (s3fs-fuse bind-mount via .volume unit file).
influxdb3_storage_backend: "local"

# Absolute path to a live s3fs-fuse mountpoint on the target host.
# Required when influxdb3_storage_backend == "s3". No default — preflight fails if absent.
# influxdb3_s3_mount_path: "/mnt/s3/influxdb3"

# -----------------------------------------------------------------------------
# Service user
# -----------------------------------------------------------------------------

# This role runs as the Ansible connecting user (ansible_user_id).
# No dedicated service account is created or required.
# Set to true only in CI/testing where the connecting user is root.
# Never set true in production.
influxdb3_allow_root_for_testing: false

# -----------------------------------------------------------------------------
# Derived path variables
# -----------------------------------------------------------------------------

# Directory where Quadlet unit files (.container, .volume) are placed.
influxdb3_quadlet_dir: "{{ ansible_user_dir }}/.config/containers/systemd"

# Path to the environment file that holds INFLUXDB3_ server config vars.
# Created mode 0600, owned by the Ansible connecting user.
influxdb3_env_file_path: "{{ ansible_user_dir }}/.config/influxdb3/{{ influxdb3_instance_name }}.env"

# -----------------------------------------------------------------------------
# Lifecycle
# -----------------------------------------------------------------------------

# Set to true to remove the instance (stops service, removes unit files and env file).
# Named volumes are NEVER deleted by this role regardless of this flag.
influxdb3_teardown: false

# systemd TimeoutStartSec and Ansible readiness probe timeout (seconds).
# Increase for slow cold-start environments.
influxdb3_startup_timeout_seconds: 120
